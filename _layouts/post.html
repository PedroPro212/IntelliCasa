<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | CasaIntelli Blog</title>
  <meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 }}">

  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/imgs/icone.ico" type="image/x-icon">
</head>

<body class="bg-black text-white font-sans">

  <!-- HEADER -->
  <header class="fixed top-0 left-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-gray-800">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
      <a href="/" class="text-xl font-bold text-white">
        Casa<span class="text-blue-400">Intelli</span>
      </a>

      <nav class="hidden md:flex gap-8 text-gray-300 items-center">
        <a href="/" class="hover:text-white transition">Início</a>
        <a href="#" class="hover:text-white transition">Serviços</a>
        <a href="/blog.html" class="hover:text-white transition">Blog</a>
        <a href="#" class="hover:text-white transition">Sobre</a>
        <a href="/#contato" class="hover:text-white transition">Contato</a>

        <!-- BOTÃO -->
        <a href="/#contato"
          class="bg-blue-500 px-5 py-2 rounded-xl text-white font-semibold hover:bg-blue-600 transition shadow-lg shadow-blue-500/30">
          Começar
        </a>
      </nav>
      <!-- MENU MOBILE BUTTON -->
      <button id="menuBtn" class="md:hidden text-white text-2xl">
        ☰
      </button>
    </div>

    <!-- MENU MOBILE -->
    <div id="mobileMenu" class="hidden md:hidden flex flex-col items-center gap-6 pb-6 bg-black/90 backdrop-blur-xl">
      <a href="#" class="text-gray-300 hover:text-white">Início</a>
      <a href="#" class="text-gray-300 hover:text-white">Serviços</a>
      <a href="/blog.html" class="hover:text-white transition">Blog</a>
      <a href="/#sobre" class="text-gray-300 hover:text-white">Sobre</a>
      <a href="/#contato" class="text-gray-300 hover:text-white">Contato</a>

      <a href="/#contato" class="bg-blue-500 px-6 py-3 rounded-xl text-white font-semibold hover:bg-blue-600 transition">
        Começar
      </a>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="pt-32 pb-20 px-6">
    <article class="max-w-3xl mx-auto">

      <p class="text-blue-400 text-sm mb-4">
        {{ page.date | date: "%d/%m/%Y" }}
      </p>

      <h1 class="text-4xl md:text-5xl font-bold mb-8 leading-tight">
        {{ page.title }}
      </h1>

      <div
        class="prose prose-invert prose-lg max-w-none prose-headings:text-white prose-p:text-gray-300 prose-li:text-gray-300 prose-strong:text-white prose-a:text-blue-400">
        {{ content }}
      </div>

    </article>
  </main>

  <!-- FOOTER -->
  <footer class="text-center text-gray-500 p-6 border-t border-gray-800">
    © 2026 CasaIntelli
  </footer>

  <script src="../js/header.js"></script>

</body>

</html>
