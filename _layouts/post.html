<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | CasaIntelli Blog</title>
  <meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 }}">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/imgs/icone.ico" type="image/x-icon">
</head>

<body class="bg-black text-white font-sans">

  <!-- HEADER -->
  <header class="fixed top-0 left-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-gray-800">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
      <a href="/" class="text-xl font-bold text-white">
        Casa<span class="text-blue-400">Intelli</span>
      </a>

      <nav class="hidden md:flex gap-8 text-gray-300 items-center">
        <a href="/" class="hover:text-white transition">Início</a>
        <a href="/blog.html" class="hover:text-white transition">Blog</a>
        <a href="/#contato" class="hover:text-white transition">Contato</a>
      </nav>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="pt-32 pb-20 px-6">
    <article class="max-w-3xl mx-auto">

      <p class="text-blue-400 text-sm mb-4">
        {{ page.date | date: "%d/%m/%Y" }}
      </p>

      <h1 class="text-4xl md:text-5xl font-bold mb-8 leading-tight">
        {{ page.title }}
      </h1>

      <div class="prose prose-invert prose-lg max-w-none">
        {{ content }}
      </div>

    </article>
  </main>

  <!-- FOOTER -->
  <footer class="text-center text-gray-500 p-6 border-t border-gray-800">
    © 2026 CasaIntelli
  </footer>

</body>
</html>
